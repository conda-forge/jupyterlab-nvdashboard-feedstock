{% set name = "jupyterlab-nvdashboard" %}
{% set version = "0.14.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rapidsai/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 0f4695abd8cbd739740101dbfc913430861274bb19e3f5aa67b8b47ebd0f3957

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - nodejs
    - hatch-jupyter-builder >=0.5
    - hatch-nodejs-version >=0.3.2
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0
  run:
    - jupyterlab >=4.0.0
    - nvidia-ml-py >=12.0.0
    - python >={{ python_min }}
    - psutil
    - tornado

test:
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
    - python -c "import jupyterlab_nvdashboard; assert jupyterlab_nvdashboard.__version__ == '{{ version }}'"
  imports:
    - jupyterlab_nvdashboard

about:
  home: https://rapids.ai
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: A JupyterLab extension for displaying dashboards of GPU usage
  description: |
    A JupyterLab extension for displaying dashboards of GPU usage.
  doc_url: https://github.com/rapidsai/jupyterlab-nvdashboard
  dev_url: https://github.com/rapidsai/jupyterlab-nvdashboard

extra:
  recipe-maintainers:
    - jameslamb
    - ncclementi
    - jacobtomlinson
    - rjzamora
    - owenlamont
    - AjayThorve
